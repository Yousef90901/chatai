<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2322c55e'%3e%3cpath d='M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66C7.32 17.57 9.55 13 17 12V8z'/%3e%3cpath d='M17 3c-5.52 0-10 4.48-10 10 0 .55.45 1 1 1s1-.45 1-1c0-4.41 3.59-8 8-8 .55 0 1-.45 1-1s-.45-1-1-1z'/%3e%3c/svg%3e" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/chat/manifest.webmanifest">
    <meta name="theme-color" content="#1a73e8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e1f20" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="خبير زراعي">
    
    <title>خبير الزراعة الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-default: #f8f9fa;
        --bg-main: #ffffff;
        --bg-sidebar: #f8f9fa;
        --bg-input: #f1f3f4;
        --bg-user-message: #d2e3fc;
        --bg-ai-message: #f1f3f4;
        --bg-hover: #f1f3f4;
        --text-primary: #202124;
        --text-secondary: #5f6368;
        --text-user-message: #0b57d0;
        --text-ai-message: #3c4043;
        --accent-primary: #1a73e8;
        --accent-primary-hover: #1867cf;
        --border-color: #e0e0e0;
      }

      .dark {
        --bg-default: #131314;
        --bg-main: #1e1f20;
        --bg-sidebar: #1e1f20;
        --bg-input: #35363a;
        --bg-user-message: #283550;
        --bg-ai-message: #35363a;
        --bg-hover: #3c4043;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-user-message: #d2e3fc;
        --text-ai-message: #e8eaed;
        --accent-primary: #89b4f8;
        --accent-primary-hover: #93baf9;
        --border-color: #3c4043;
      }
      
      body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--bg-default);
        color: var(--text-primary);
      }
      .mermaid svg {
        max-width: 100%;
        height: auto;
      }
    </style>
    <script>
      // Set theme on initial load to prevent flash
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      const initialTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'default';
      mermaid.initialize({ startOnLoad: false, theme: initialTheme });
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.18.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/chat/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
